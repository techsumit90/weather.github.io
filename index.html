<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Atmos — Hyperlocal weather intelligence. Get real-time weather, 24-hour hourly forecasts, and 7-day outlooks for any city in the world. No sign-up required.">
  <meta name="theme-color" content="#1a2a6c">

  <!-- Open Graph (social preview) -->
  <meta property="og:title" content="Atmos — Hyperlocal Weather">
  <meta property="og:description" content="Real-time weather with dynamic theming, hourly & 7-day forecasts — built with pure HTML, CSS & JavaScript.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://techsumit90.github.io/weather.github.io/">

  <title>Atmos — Weather</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="stars" id="stars" aria-hidden="true"></div>

  <div class="app">

    <!-- Branding -->
    <header class="brand">
      <h1>Atm<span>os</span></h1>
      <p>Hyperlocal weather intelligence</p>
    </header>

    <!-- Search Bar -->
    <div class="search-wrap" role="search">
      <div class="search-row">
        <label for="searchInput" class="visually-hidden">Search city, county, or region</label>
        <input
          class="search-input"
          id="searchInput"
          type="text"
          placeholder="Search city, county, or region…"
          autocomplete="off"
          aria-autocomplete="list"
          aria-controls="autocomplete"
          aria-haspopup="listbox"
        >
        <button class="locate-btn" id="locateBtn" aria-label="Use my current location">📍</button>
        <button class="search-btn" id="searchBtn" aria-label="Search">Go</button>
      </div>
      <div class="autocomplete" id="autocomplete" role="listbox" aria-label="Location suggestions"></div>
    </div>

    <!-- Dynamic Weather Content (injected by JS) -->
    <main id="content" aria-live="polite">
      <div class="state-box">
        <div class="state-icon" aria-hidden="true">🌍</div>
        <div class="state-msg">
          Detecting your location…
          <br>
          <small>Please allow location access</small>
        </div>
      </div>
    </main>

  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
